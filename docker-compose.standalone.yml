version: '3.9'

services:
  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: hotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-hoteldb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # CACHE & SESSION STORE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: hotel-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-secretredis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secretredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================
  # API (NestJS)
  # ============================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: hotel-api
    restart: unless-stopped
    environment:
      # Pass through all env vars from .env
      - NODE_ENV=production
      - PORT=4000
    env_file:
      - .env.standalone
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotel-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # WEB (Next.js)
  # ============================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: hotel-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env.standalone
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - hotel-net
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  redis_data:

networks:
  hotel-net:
    driver: bridge